<style>
/* ─────────────────────────────────────────────
   BASE RESET & FONT
───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

.appr-dash {
    font-size: 13px;
    color: #1a2332;
    background: #f4f6fb;
    padding: 20px 24px;
    min-height: 100vh;
}

/* ─────────────────────────────────────────────
   FILTER BAR
───────────────────────────────────────────── */
.appr-filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: flex-end;
    background: #fff;
    border: 1px solid #e2e5ec;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

/* Frappe control wrappers inside filter bar */
.appr-filter-bar .frappe-control {
    flex: 1 1 160px;
    min-width: 140px;
    max-width: 220px;
}
.appr-filter-bar .frappe-control .control-label {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: block;
}
.appr-filter-bar .frappe-control input,
.appr-filter-bar .frappe-control select {
    height: 34px;
    font-size: 12px;
    border-radius: 6px;
    border: 1px solid #d5d9e0;
    padding: 0 10px;
    width: 100%;
    background: #fafbfc;
    color: #1a2332;
    transition: border-color 0.2s;
}
.appr-filter-bar .frappe-control input:focus,
.appr-filter-bar .frappe-control select:focus {
    border-color: #2e86c1;
    outline: none;
    background: #fff;
}

/* ─────────────────────────────────────────────
   UNIT TABS
───────────────────────────────────────────── */
.appr-unit-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
    align-items: center;
}
.unit-tab {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 20px;
    border: 1px solid #d5d9e0;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    line-height: 1;
}
.unit-tab:hover { background: #f0f4ff; border-color: #2e86c1; color: #2e86c1; }
.unit-tab.active { background: #1a2332; border-color: #1a2332; color: #fff; }
.tab-icon { font-size: 13px; }

/* ─────────────────────────────────────────────
   KPI ROW
───────────────────────────────────────────── */
.appr-kpi-row {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 20px;
}
@media (max-width: 1100px) { .appr-kpi-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 680px)  { .appr-kpi-row { grid-template-columns: repeat(2, 1fr); } }

.appr-kpi-card {
    background: #fff;
    border: 1px solid #e2e5ec;
    border-radius: 10px;
    padding: 16px 14px 14px;
    position: relative;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s;
    overflow: hidden;
}
.appr-kpi-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-1px); }

/* Top accent bars */
.appr-kpi-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 10px 10px 0 0;
}
#card_total_emp::before  { background: #6f42c1; }
#card_completed::before  { background: #28a745; }
#card_pending::before    { background: #ffc107; }
#card_overdue::before    { background: #dc3545; }
#card_top_perf::before   { background: #17a2b8; }
#card_low_perf::before   { background: #e53935; }

.kpi-val {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.1;
    margin: 4px 0 6px;
    display: block;
}
.kpi-val.purple { color: #6f42c1; }
.kpi-val.green  { color: #28a745; }
.kpi-val.yellow { color: #d4a000; }
.kpi-val.red    { color: #dc3545; }
.kpi-val.teal   { color: #17a2b8; }

.kpi-sub {
    font-size: 11px;
    color: #888;
    font-weight: 500;
    line-height: 1.4;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
}

/* ─────────────────────────────────────────────
   OVERALL AI SUMMARY BAR
───────────────────────────────────────────── */
.overall-summary-area {
    display: none;
    background: #fff;
    border: 1px solid #e2e5ec;
    border-top: 4px solid #6f42c1;
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.overall-summary-area .ai-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e8eaf0;
}
.overall-summary-area .ai-card-header h4 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    color: #6f42c1;
}

/* ─────────────────────────────────────────────
   SECTION WRAPPERS
───────────────────────────────────────────── */
.appr-section {
    background: #fff;
    border: 1px solid #e2e5ec;
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.appr-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    cursor: pointer;
    background: #fff;
    border-bottom: 1px solid transparent;
    transition: background 0.2s, border-color 0.2s;
    user-select: none;
    gap: 12px;
    min-height: 52px;
}
.appr-section-header:hover { background: #f8f9fa; }
.appr-section-header.open  { border-bottom-color: #e8eaf0; }

.section-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
}
.section-icon {
    width: 32px;
    height: 32px;
    background: #f0f4ff;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
}
.section-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a2332;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.section-header-right {
    display: flex;
    align-items: left;
    gap: 10px;
    flex-shrink: 0;
}
.section-header-right .section-desc {
    font-size: 11px;
    color: #555;
    background: #f0f4ff;
    padding: 4px 10px;
    border-radius: 0 6px 6px 0;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.section-header-right {
    background: #f0f4ff;
    border-left: 3px solid #3b82f6;
    border-radius: 0 6px 6px 0;
    padding: 8px 14px;
    width:60%;
    align-items:right;
    font-size: 11px;
    color: #1e40af;
    margin-bottom: 14px;
    line-height: 1.6;
}
.section-header-right strong { color: #1e3a8a; }
@media (max-width: 900px) { .section-header-right .section-desc { display: none; } }

.section-toggle-arrow {
    color: #888;
    font-size: 11px;
    transition: transform 0.25s;
    display: inline-block;
    flex-shrink: 0;
}
.appr-section-header.open .section-toggle-arrow { transform: rotate(180deg); }

.appr-section-body {
    display: none;
    padding: 20px 22px 22px;
}
.appr-section-body.open { display: block; }

/* ─────────────────────────────────────────────
   INFO ICON
───────────────────────────────────────────── */
.ii {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    vertical-align: middle;
    line-height: 1;
    transition: opacity 0.15s;
    font-style: normal;
}
.ii:hover { opacity: 0.75; }
.ii.muted { background: #e8eaf0; color: #888; }
.ii.dark  { background: #d0d5e8; color: #444; }
.ii.light { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.9); }

/* ─────────────────────────────────────────────
   MINI STATS ROW
───────────────────────────────────────────── */
.mini-stats-row {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 18px;
}
@media (max-width: 680px) { .mini-stats-row { grid-template-columns: 1fr; } }

.mini-stat {
    background: #fff;
    border: 1px solid #e2e5ec;
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
}
.mini-stat-val {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 4px;
}
.mini-stat-label {
    font-size: 11px;
    color: #777;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
}

/* ─────────────────────────────────────────────
   DATA TABLE
───────────────────────────────────────────── */
.appr-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}
.appr-table thead tr {
    background: #f5f7fa;
}
.appr-table th {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
    border-bottom: 1px solid #e8eaf0;
    text-align: left;
}
.appr-table th:not(:first-child) { text-align: center; }
.appr-table td {
    padding: 10px 14px;
    border-bottom: 1px solid #f0f2f5;
    vertical-align: middle;
    color: #1a2332;
}
.appr-table tbody tr:last-child td { border-bottom: none; }
.appr-table tbody tr:hover { background: #f7f9ff; }
.appr-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.appr-table th { background: #0f1f3d; color: #fff; padding: 9px 12px; text-align: left; font-size: 11px; letter-spacing: 0.5px; }
.appr-table td { padding: 9px 12px; border-bottom: 1px solid #e9ecef; }
.appr-table tr:nth-child(odd)  td { background: #f8f9fa; }
.appr-table tr:nth-child(even) td { background: #fff; }
.appr-table tr:hover td { background: #fce8ec; }
/* ─────────────────────────────────────────────
   PROGRESS BAR
───────────────────────────────────────────── */
.progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
}
.progress-bar-bg {
    flex: 1;
    height: 8px;
    background: #eef0f4;
    border-radius: 4px;
    overflow: hidden;
}
.progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
}
.progress-pct {
    font-size: 11px;
    font-weight: 700;
    min-width: 34px;
    text-align: right;
}

/* ─────────────────────────────────────────────
   BADGES
───────────────────────────────────────────── */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 9px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    line-height: 1.5;
}
.badge-critical {
    background: #FDEBEC;
    color: #C8102E;
    border: 1px solid #F5B7C2;
}

.badge-warning {
    background: #FFF8E1;
    color: #B28704;
    border: 1px solid #FFE082;
}

.badge-active {
    background: #FFFDE7;
    color: #C0A800;
    border: 1px solid #FFF59D;
}
.badge-state    { background: #f0f4ff; color: #1a2332; border: 1px solid #d0d8f0; }

/* ─────────────────────────────────────────────
   PAGINATION BAR
───────────────────────────────────────────── */
.pag-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: #f8f9fa;
    border-top: 1px solid #e8eaf0;
    font-size: 11px;
    color: #777;
}

/* ─────────────────────────────────────────────
   BELL CURVE TOGGLES
───────────────────────────────────────────── */
.bell-toggle-group {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
}
.bell-toggle-btn {
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 20px;
    border: 1.5px solid;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    line-height: 1;
}

/* ─────────────────────────────────────────────
   AI INSIGHT CARD
───────────────────────────────────────────── */
.ai-insight-card {
    background: #f8f9fa;
    border: 1px solid #e2e5ec;
    border-left: 4px solid #2e86c1;
    border-radius: 0 8px 8px 0;
    padding: 16px 18px;
    margin-top: 18px;
}
.ai-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e2e5ec;
    gap: 10px;
}
.ai-card-header h4 {
    margin: 0;
    font-size: 13px;
    font-weight: 700;
    color: #2e86c1;
    white-space: nowrap;
}
.ai-insight-content {
    font-size: 13px;
    line-height: 1.7;
    color: #333;
}

/* ─────────────────────────────────────────────
   INFO POPUP
───────────────────────────────────────────── */
#info-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 9998;
}
#info-popup-modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    border-radius: 12px;
    width: min(480px, 90vw);
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    z-index: 9999;
    overflow: hidden;
}
.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: #1a2332;
    gap: 10px;
}
.popup-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
}
.popup-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 14px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
}
.popup-close:hover { background: rgba(255,255,255,0.3); }
.popup-body { padding: 16px 18px; }
.popup-section { margin-bottom: 12px; }
.popup-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #888;
    margin-bottom: 4px;
}
.popup-section-text {
    font-size: 13px;
    line-height: 1.6;
    color: #333;
}
.popup-formula-box,
.popup-example-box {
    background: #f5f7fa;
    border: 1px solid #e2e5ec;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #1a2332;
    line-height: 1.5;
    word-break: break-word;
}
.popup-divider {
    border: none;
    border-top: 1px solid #e8eaf0;
    margin: 10px 0;
}

/* ─────────────────────────────────────────────
   CHART CONTAINERS
───────────────────────────────────────────── */
.chart-grid-2col {
    display: grid;
    grid-template-columns: 1fr 400px;
    gap: 20px;
    align-items: start;
    margin-bottom: 20px;
}
@media (max-width: 760px) { .chart-grid-2col { grid-template-columns: 1fr; } }

.chart-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
}
.chart-legend {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 8px;
    flex-wrap: wrap;
    font-size: 11px;
    color: #555;
}
.chart-legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
}

/* ─────────────────────────────────────────────
   PRINT / PDF
───────────────────────────────────────────── */
@media print {
    .appr-filter-bar,
    .appr-unit-tabs,
    .bell-toggle-group,
    .ai-insight-card,
    .pag-bar,
    .btn,
    .section-toggle-arrow { display: none !important; }

    .appr-dash { background: white; padding: 0; }
    .appr-section { border: 1px solid #ddd; box-shadow: none; page-break-inside: avoid; margin-bottom: 10px; }
    .appr-section-body { display: block !important; }
    .appr-section-header { border-bottom: 1px solid #ddd; }
    canvas { max-width: 100% !important; height: auto !important; }
}
</style>

<div class="appr-dash" id="dashboard-export-wrapper">

    <!-- Filter Bar -->
    <div class="appr-filter-bar" id="filter-area"></div>

    <!-- Unit Tabs -->
    <div class="appr-unit-tabs" id="unit-tabs-row"></div>

    <!-- Overall AI Summary (hidden until triggered) -->
    <div class="overall-summary-area" id="overall-ai-summary">
        <div class="ai-card-header">
            <h4>&#10024; Executive Dashboard Summary</h4>
        </div>
        <div id="overall-ai-content" class="ai-insight-content"></div>
    </div>

    <!-- KPI Cards -->
    <div class="appr-kpi-row">

        <div class="appr-kpi-card" id="card_total_emp">
            <div class="kpi-val purple" id="total_emp">0</div>
            <div class="kpi-sub">Total Employees <span class="ii muted" data-info-key="total_emp">i</span></div>
        </div>

        <div class="appr-kpi-card" id="card_completed">
            <div class="kpi-val green" id="total_completed">0%</div>
            <div class="kpi-sub" id="kpi-completed-sub">Completed <span class="ii muted" data-info-key="total_completed">i</span></div>
        </div>

        <div class="appr-kpi-card" id="card_pending">
            <div class="kpi-val yellow" id="total_pending">0%</div>
            <div class="kpi-sub" id="kpi-pending-sub">Pending <span class="ii muted" data-info-key="total_pending">i</span></div>
        </div>

        <div class="appr-kpi-card" id="card_overdue">
            <div class="kpi-val red" id="total_overdue">0%</div>
            <div class="kpi-sub" id="kpi-overdue-sub">Overdue <span class="ii muted" data-info-key="total_overdue">i</span></div>
        </div>

        <div class="appr-kpi-card" id="card_top_perf">
            <div class="kpi-val teal" id="top_perf">0</div>
            <div class="kpi-sub">Top Performers <span class="ii muted" data-info-key="top_perf">i</span></div>
        </div>

        <div class="appr-kpi-card" id="card_low_perf">
            <div class="kpi-val red" id="low_perf">0</div>
            <div class="kpi-sub">Low Performers <span class="ii muted" data-info-key="low_perf">i</span></div>
        </div>

    </div>

    <!-- Dynamic Dashboard Sections -->
    <div id="dashboard-content"></div>

</div>

<!-- Info Popup -->
<div id="info-popup-overlay"></div>
<div id="info-popup-modal" role="dialog" aria-modal="true">
    <div class="popup-header">
        <span class="popup-title" id="info-popup-title"></span>
        <button class="popup-close" id="info-popup-close" aria-label="Close">&#x2715;</button>
    </div>
    <div class="popup-body">
        <div class="popup-section">
            <div class="popup-section-label">Description</div>
            <div class="popup-section-text" id="info-popup-desc"></div>
        </div>
        <hr class="popup-divider">
        <div class="popup-section">
            <div class="popup-section-label">Formula / Logic</div>
            <div class="popup-formula-box" id="info-popup-formula"></div>
        </div>
        <hr class="popup-divider">
        <div class="popup-section">
            <div class="popup-section-label">Example</div>
            <div class="popup-example-box" id="info-popup-example"></div>
        </div>
    </div>
</div>
